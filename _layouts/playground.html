<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  <script src="{{ "/assets/js/theme.js" | relative_url }}"></script>
  <script>
    initTheme();
    function setThemeIconHTML(button) {
      const theme = getTheme();
      const isDark = theme == "dark";
      button.innerHTML = !isDark ? "&#x1F31A;" : "&#x1F31D;";
    }
    function toggleTheme(button) {
      const theme = getTheme();
      const isDark = theme == "dark";
      setTheme(isDark ? "light" : "dark");
      setThemeIconHTML(button);
    }

    const params = new URL(document.location.toString()).searchParams;
    const q_query = params.get("q");
  </script>

  <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/playground.css?v=" | append: site.github.build_revision | relative_url }}">

  <script>
    var vs_editor;
    initTheme();
    function setThemeIconHTML(button) {
      const theme = getTheme();
      const isDark = theme == "dark";
      button.innerHTML = !isDark ? "&#x1F31A;" : "&#x1F31D;";
    }
    function toggleTheme(button) {
      const theme = getTheme();
      const isDark = theme == "dark";
      setTheme(isDark ? "light" : "dark");
      monaco.editor.setTheme(isDark ? "vs" : "vs-dark");
      setThemeIconHTML(button);
    }

    function beforeUnload() {
      return "Are you sure you want to leave?\nProgress will be lost.";
    }
  </script>

  <!--[if lt IE 9]>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
  <![endif]-->
  {% include head-custom.html %}

</head>

<body onbeforeunload="return beforeUnload()">

  <header>
    <h3>SuperC Playground</h3>
    <a href="{{ '/' | relative_url }}">Documentation</a>
  </header>

  <div id="vs-editor"></div>
  <div id="term_container"></div>

  <footer>Powered by <a target="_blank" href="https://bellard.org/jslinux/">https://bellard.org/jslinux/</a></footer>
  <button id="toggle-theme" class="clean" onclick="toggleTheme(this)"></button>
  <script>
    setThemeIconHTML(document.getElementById("toggle-theme"));
  </script>

  <!-- Monaco loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <script>
    require.config({
      paths: {
        vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs"
      }
    });

    require(["vs/editor/editor.main"], () => {
      vs_editor = monaco.editor.create(document.getElementById("vs-editor"), {
        value: [
          "#include <stdio.h>",
          "",
          "int main() {",
          "  printf(\"Hello World!\\n\");",
          "  return 0;",
          "}"
        ].join("\n"),
        language: "c",
        theme: getTheme() == "dark" ? "vs-dark" : "vs"
      });
    });

    window.addEventListener("resize", () => {
      vs_editor.layout();
    });
  </script>
</body>

</html>
